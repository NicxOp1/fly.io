app = "fly-io-bu65ua"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  TOKEN = "aria-secret-token-2024"
  TIMEOUT = "60000"
  CONCURRENT = "5"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.checks]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
