app = "fly-io-bu65ua"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

# TOKEN is set via `fly secrets` - do not hardcode here

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "requests"
  hard_limit = 5
  soft_limit = 3

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2048mb"
